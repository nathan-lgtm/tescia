<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeSciA — Entraînement</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$'],['\\[','\\]']]},svg:{fontCache:'global'},startup:{ready(){MathJax.startup.defaultReady();MathJax.startup.promise.then(()=>{window._mathJaxReady=true;});}}};</script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap');
    :root{
      --bg:#0f1117;--surface:#181c27;--surface2:#1e2336;--surface3:#232840;
      --ink:#e8e6f0;--ink2:#9896b0;--ink3:#5a5870;
      --accent:#4f8ef7;--accent-l:#1a3060;
      --green:#2ecc8a;--green-l:#0d3322;--green-b:#1a5c3a;
      --red:#f75f5f;--red-l:#2a1010;
      --gold:#f5c842;--gold-l:#2a2010;
      --border:#2a2e45;--border-s:#363b58;
      --d1:#1a3a1a;--d2:#1a2a4a;--d3:#2a2a1a;--d4:#3a1a1a;--d5:#2a1a3a;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Source Serif 4',Georgia,serif;background:var(--bg);color:var(--ink);min-height:100vh;}

    /* TOPBAR */
    .topbar{position:sticky;top:0;z-index:100;height:52px;background:var(--surface);border-bottom:1px solid var(--border-s);display:flex;align-items:center;padding:0 1.5rem;gap:1.5rem;}
    .topbar-logo{display:flex;align-items:center;gap:10px;}
    .logo-badge{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:600;color:var(--accent);background:var(--accent-l);padding:3px 10px;border-radius:4px;border:1px solid var(--accent);}
    .topbar .t2{font-size:0.72rem;color:var(--ink3);font-style:italic;}
    .topbar-sep{width:1px;height:24px;background:var(--border-s);flex-shrink:0;}
    .nav-btn{font-family:'Source Serif 4',serif;font-size:0.82rem;color:var(--ink2);background:none;border:1px solid var(--border);border-radius:4px;padding:4px 11px;cursor:pointer;text-decoration:none;transition:all 0.15s;}
    .nav-btn:hover,.nav-btn.active{color:var(--ink);border-color:var(--border-s);}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
    .streak-badge{display:flex;align-items:center;gap:5px;background:var(--gold-l);border:1px solid #5a4010;border-radius:20px;padding:3px 11px;}
    .streak-num{font-family:'JetBrains Mono',monospace;font-size:0.85rem;font-weight:600;color:var(--gold);}
    .user-name{font-size:0.78rem;color:var(--ink2);font-style:italic;}
    .btn-logout{font-family:'Source Serif 4',serif;font-size:0.78rem;color:var(--ink3);background:none;border:1px solid var(--border);border-radius:4px;padding:3px 9px;cursor:pointer;transition:all 0.15s;}
    .btn-logout:hover{color:var(--red);border-color:var(--red);}

    /* LAYOUT */
    .layout{display:flex;min-height:calc(100vh - 52px);}

    /* SIDEBAR */
    .sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:1.2rem 0;overflow-y:auto;position:sticky;top:52px;height:calc(100vh - 52px);}
    .sidebar-section{margin-bottom:0.5rem;}
    .sidebar-label{font-size:0.63rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink3);padding:0.4rem 1.2rem;margin-top:0.8rem;}
    .theme-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 1.2rem;background:none;border:none;color:var(--ink2);font-family:'Source Serif 4',serif;font-size:0.85rem;cursor:pointer;text-align:left;transition:background 0.12s;}
    .theme-btn:hover{background:var(--surface2);}
    .theme-btn.active{background:var(--accent-l);color:var(--accent);}
    .theme-count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--ink3);}
    .theme-btn.active .theme-count{color:var(--accent);}
    .theme-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

    /* MAIN */
    .main{flex:1;padding:1.5rem 2rem 4rem;max-width:820px;}

    /* STATS BAR */
    .stats-bar{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 16px;flex:1;min-width:100px;}
    .stat-val{font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:600;line-height:1;color:var(--ink);}
    .stat-val.green{color:var(--green);}
    .stat-val.gold{color:var(--gold);}
    .stat-lbl{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--ink3);margin-top:3px;}

    /* FILTERS */
    .filters{display:flex;gap:0.6rem;margin-bottom:1.2rem;flex-wrap:wrap;align-items:center;}
    .filter-label{font-size:0.78rem;color:var(--ink3);font-style:italic;}
    .filter-btn{font-family:'Source Serif 4',serif;font-size:0.8rem;padding:3px 11px;border:1px solid var(--border-s);border-radius:20px;background:var(--surface);color:var(--ink2);cursor:pointer;transition:all 0.15s;}
    .filter-btn.active{background:var(--ink);color:var(--bg);border-color:var(--ink);}
    .filter-btn:hover:not(.active){border-color:var(--ink2);color:var(--ink);}
    .filter-sep{width:1px;height:16px;background:var(--border-s);}

    /* QUESTION CARD */
    .q-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:1rem;overflow:hidden;transition:border-color 0.2s;}
    .q-card.correct{border-color:var(--green-b);}
    .q-card.wrong-tried{border-color:#5a1010;}
    .q-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2);}
    .q-num{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--ink3);}
    .q-source{font-size:0.72rem;color:var(--ink3);font-style:italic;}
    .q-type-badge{font-family:'JetBrains Mono',monospace;font-size:0.62rem;padding:2px 7px;border-radius:3px;}
    .q-type-badge.M{background:var(--accent-l);color:var(--accent);}
    .q-type-badge.L{background:var(--green-l);color:var(--green);}
    .level-pip{font-family:'JetBrains Mono',monospace;font-size:0.6rem;padding:1px 5px;border-radius:3px;margin-left:auto;}
    .lv1{background:var(--d1);color:#6ecc6e;} .lv2{background:var(--d2);color:#6eaaff;}
    .lv3{background:var(--d3);color:#cccc6e;} .lv4{background:var(--d4);color:#ff8e8e;}
    .lv5{background:var(--d5);color:#cc88ff;}
    .status-icon{margin-left:4px;font-size:0.9rem;}

    .q-body{padding:14px 16px;}
    .q-context{font-size:0.85rem;color:var(--ink2);font-style:italic;margin-bottom:10px;padding:8px 12px;background:var(--surface2);border-left:2px solid var(--border-s);border-radius:0 4px 4px 0;}
    .q-text{font-size:0.95rem;line-height:1.6;color:var(--ink);margin-bottom:12px;}

    /* MCQ Choices */
    .choices{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
    .choice{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:5px;cursor:pointer;transition:all 0.12s;background:var(--surface2);}
    .choice:hover:not(.disabled){border-color:var(--border-s);background:var(--surface3);}
    .choice.selected:not(.correct):not(.wrong){border-color:var(--accent);background:var(--accent-l);}
    .choice.correct{border-color:var(--green-b);background:var(--green-l);cursor:default;}
    .choice.wrong{border-color:#5a1010;background:var(--red-l);cursor:default;}
    .choice.show-correct{border-color:var(--green-b);background:var(--green-l);}
    .choice.disabled{cursor:default;}
    .choice-letter{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--ink3);flex-shrink:0;margin-top:2px;}
    .choice.correct .choice-letter{color:var(--green);}
    .choice.wrong .choice-letter{color:var(--red);}
    .choice-text{font-size:0.88rem;line-height:1.5;}

    /* L type answer */
    .l-answer-wrap{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
    .l-input{flex:1;padding:8px 12px;background:var(--surface2);border:1px solid var(--border-s);border-radius:5px;color:var(--ink);font-family:'JetBrains Mono',monospace;font-size:0.95rem;outline:none;transition:border-color 0.15s;}
    .l-input:focus{border-color:var(--accent);}
    .l-input.correct-input{border-color:var(--green);color:var(--green);}
    .l-input.wrong-input{border-color:var(--red);color:var(--red);}
    .l-submit{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:5px;font-family:'Source Serif 4',serif;font-size:0.85rem;cursor:pointer;transition:opacity 0.15s;flex-shrink:0;}
    .l-submit:hover{opacity:0.85;}
    .l-submit:disabled{opacity:0.4;cursor:not-allowed;}

    /* Explanation */
    .explanation{display:none;padding:10px 12px;background:var(--surface2);border-left:3px solid var(--green);border-radius:0 5px 5px 0;font-size:0.85rem;color:var(--ink2);line-height:1.6;margin-top:4px;}
    .explanation.show{display:block;}
    .explanation.wrong-exp{border-left-color:var(--red);}

    /* Loading */
    #loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--ink3);font-style:italic;z-index:999;}

    /* Empty state */
    .empty{text-align:center;padding:3rem;color:var(--ink3);font-style:italic;}

    /* Scrollbar */
    ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:3px;}

    @media(max-width:680px){.sidebar{display:none;}.main{padding:1rem 1rem 3rem;}.stats-bar{gap:0.6rem;}}
  </style>
</head>
<body>
<div id="loading">Chargement…</div>

<header class="topbar" style="display:none" id="topbar">
  <div class="topbar-logo">
    <span class="logo-badge">TeSciA</span>
    <span class="t2">Mathématiques Générales · AORES</span>
  </div>
  <div class="topbar-sep"></div>
  <a class="nav-btn" href="classement.html">Classement</a>
  <a class="nav-btn" href="profil.html">Mon profil</a>
  <div class="topbar-right">
    <div class="streak-badge">🔥 <span class="streak-num" id="streakNum">0</span></div>
    <span class="user-name" id="userName"></span>
    <button class="btn-logout" id="btnLogout">Déconnexion</button>
  </div>
</header>

<div class="layout" style="display:none" id="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main">
    <div class="stats-bar" id="statsBar"></div>
    <div class="filters" id="filtersBar"></div>
    <div id="questionsContainer"></div>
  </main>
</div>

<!-- ─── QUESTIONS DATABASE ─── -->
<script src="questions.js"></script>

<script>
// ════════════════════════════════
// ⚙️ REMPLACE CES DEUX VALEURS
// ════════════════════════════════
const SUPABASE_URL  = 'https://zspjuhetvlcgkbrxzifg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzcGp1aGV0dmxjZ2ticnh6aWZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTg4NTgsImV4cCI6MjA5MTY3NDg1OH0.7ckFf7yAQbNs2b4qcZz8xbEY7J4LwGKIkkl_78YUoF4';
// ════════════════════════════════
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── THÈMES ──
const THEMES = {
  "Limites":       {color:"#6eaaff",dot:"var(--d2)"},
  "Dérivées":      {color:"#cccc6e",dot:"var(--d3)"},
  "Probabilités":  {color:"#ff8e8e",dot:"var(--d4)"},
  "Géométrie":     {color:"#cc88ff",dot:"var(--d5)"},
  "Algèbre":       {color:"#6ecc6e",dot:"var(--d1)"},
  "Suites":        {color:"#f5c842",dot:"var(--gold-l)"},
  "Trigonométrie": {color:"#88ccff",dot:"var(--d2)"},
};

const LETTERS = ['A','B','C','D','E'];
let userId = null;
let userAnswers = {}; // questionId -> {correct, attempts}
let currentTheme = "Limites";
let filterStatus = "all";
let filterLevel = 0;

function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// ── STREAK ──
async function getStreak(){
  const {data}=await sb.from('activity_days').select('day').eq('user_id',userId).order('day',{ascending:false});
  if(!data||!data.length) return 0;
  const days=data.map(r=>r.day);
  let streak=0,cur=new Date();cur.setHours(0,0,0,0);
  while(true){
    const s=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    if(days.includes(s)){streak++;cur.setDate(cur.getDate()-1);}else break;
  }
  return streak;
}
async function markToday(){await sb.from('activity_days').upsert({user_id:userId,day:todayStr()},{onConflict:'user_id,day',ignoreDuplicates:true});}

// ── SAVE ANSWER ──
async function saveAnswer(qid, theme, correct){
  const existing=userAnswers[qid];
  if(existing&&existing.correct) return; // already solved
  const attempts=(existing?existing.attempts:0)+1;
  const now=new Date().toISOString();
  const upsertData={user_id:userId,question_id:qid,theme,correct,attempts,last_attempted_at:now};
  if(correct) upsertData.first_correct_at=now;
  await sb.from('answers').upsert(upsertData,{onConflict:'user_id,question_id'});
  userAnswers[qid]={correct,attempts};
  if(correct) markToday();
}

// ── RENDER SIDEBAR ──
function buildSidebar(){
  const nav=document.getElementById('sidebar');
  nav.innerHTML='<div class="sidebar-section"><div class="sidebar-label">Thèmes</div></div>';
  const all=[...new Set(TESCIA_DB.map(q=>q.theme))];
  all.forEach(theme=>{
    const total=TESCIA_DB.filter(q=>q.theme===theme).length;
    const done=TESCIA_DB.filter(q=>q.theme===theme&&userAnswers[q.id]?.correct).length;
    const btn=document.createElement('button');
    btn.className='theme-btn'+(theme===currentTheme?' active':'');
    const col=(THEMES[theme]||{color:'#888'}).color;
    btn.innerHTML=`<span class="theme-dot" style="background:${col}"></span>${theme}<span class="theme-count">${done}/${total}</span>`;
    btn.addEventListener('click',()=>{currentTheme=theme;filterStatus='all';filterLevel=0;buildSidebar();buildMain();});
    nav.appendChild(btn);
  });
}

// ── RENDER STATS ──
function buildStats(){
  const qs=TESCIA_DB.filter(q=>q.theme===currentTheme);
  const total=qs.length;
  const correct=qs.filter(q=>userAnswers[q.id]?.correct).length;
  const pct=total?Math.round(correct/total*100):0;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-card"><div class="stat-val green">${correct}</div><div class="stat-lbl">Résolues</div></div>
    <div class="stat-card"><div class="stat-val">${total-correct}</div><div class="stat-lbl">Restantes</div></div>
    <div class="stat-card"><div class="stat-val gold">${pct} %</div><div class="stat-lbl">Progression</div></div>
  `;
}

// ── RENDER FILTERS ──
function buildFilters(){
  const fb=document.getElementById('filtersBar');
  fb.innerHTML='';
  const addLabel=txt=>{const s=document.createElement('span');s.className='filter-label';s.textContent=txt;fb.appendChild(s);};
  const addBtn=(txt,active,onClick)=>{const b=document.createElement('button');b.className='filter-btn'+(active?' active':'');b.textContent=txt;b.addEventListener('click',onClick);fb.appendChild(b);};
  const addSep=()=>{const s=document.createElement('div');s.className='filter-sep';fb.appendChild(s);};
  addLabel('Afficher :');
  addBtn('Toutes',filterStatus==='all',()=>{filterStatus='all';buildFilters();buildQuestions();});
  addBtn('Non résolues',filterStatus==='todo',()=>{filterStatus='todo';buildFilters();buildQuestions();});
  addBtn('Résolues',filterStatus==='done',()=>{filterStatus='done';buildFilters();buildQuestions();});
  addSep();
  addLabel('Niveau :');
  addBtn('Tous',filterLevel===0,()=>{filterLevel=0;buildFilters();buildQuestions();});
  [1,2,3,4,5].forEach(l=>addBtn(l.toString(),filterLevel===l,()=>{filterLevel=l;buildFilters();buildQuestions();}));
}

// ── RENDER QUESTIONS ──
function buildQuestions(){
  const container=document.getElementById('questionsContainer');
  container.innerHTML='';
  let qs=TESCIA_DB.filter(q=>q.theme===currentTheme);
  if(filterStatus==='done') qs=qs.filter(q=>userAnswers[q.id]?.correct);
  if(filterStatus==='todo') qs=qs.filter(q=>!userAnswers[q.id]?.correct);
  if(filterLevel>0) qs=qs.filter(q=>q.level===filterLevel);
  if(!qs.length){container.innerHTML='<div class="empty">Aucune question pour ces critères.</div>';return;}
  qs.forEach(q=>container.appendChild(buildQuestionCard(q)));
  // Re-render MathJax
  if(window._mathJaxReady) MathJax.typesetPromise([container]);
}

function buildQuestionCard(q){
  const isSolved=!!userAnswers[q.id]?.correct;
  const wasAttempted=!!userAnswers[q.id];
  const card=document.createElement('div');
  card.className='q-card'+(isSolved?' correct':wasAttempted?' wrong-tried':'');
  card.id='card-'+q.id;

  // Header
  const src=q.year?`${q.year} · ${q.source}`:`Inédit · Niv.${q.level}`;
  card.innerHTML=`
    <div class="q-header">
      <span class="q-num">${q.id}</span>
      <span class="q-type-badge ${q.type}">${q.type}</span>
      <span class="q-source">${src}</span>
      <span class="level-pip lv${q.level}">Niv.${q.level}</span>
      <span class="status-icon">${isSolved?'✓':wasAttempted?'✗':''}</span>
    </div>
    <div class="q-body">
      ${q.context?`<div class="q-context">${q.context}</div>`:''}
      <div class="q-text">${q.question}</div>
    </div>
  `;

  const body=card.querySelector('.q-body');

  if(q.type==='M'){
    // MCQ
    const choicesDiv=document.createElement('div');choicesDiv.className='choices';
    q.choices.forEach((c,i)=>{
      const letter=LETTERS[i];
      const ch=document.createElement('div');
      ch.className='choice'+(isSolved?' disabled':'');
      if(isSolved&&letter===q.answer) ch.classList.add('correct');
      ch.innerHTML=`<span class="choice-letter">${letter}</span><span class="choice-text">${c}</span>`;
      if(!isSolved){
        ch.addEventListener('click',()=>handleMChoice(q,letter,card,choicesDiv));
      }
      choicesDiv.appendChild(ch);
    });
    body.appendChild(choicesDiv);
  } else {
    // L type
    const wrap=document.createElement('div');wrap.className='l-answer-wrap';
    const inp=document.createElement('input');
    inp.type='text';inp.className='l-input';inp.placeholder='Ta réponse…';
    if(isSolved){inp.value=q.answerDisplay.replace(/\$/g,'');inp.disabled=true;inp.classList.add('correct-input');}
    const btn=document.createElement('button');btn.className='l-submit';btn.textContent='Valider';
    if(isSolved) btn.disabled=true;
    btn.addEventListener('click',()=>handleLAnswer(q,inp,btn,card));
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')btn.click();});
    wrap.appendChild(inp);wrap.appendChild(btn);
    body.appendChild(wrap);
  }

  // Explanation
  const exp=document.createElement('div');
  exp.className='explanation'+(isSolved?' show':'');
  exp.textContent=''; // will be set via MathJax
  exp.innerHTML=`💡 ${q.explanation}`;
  if(isSolved) exp.classList.add('show');
  body.appendChild(exp);

  return card;
}

async function handleMChoice(q,letter,card,choicesDiv){
  const choices=choicesDiv.querySelectorAll('.choice');
  const correct=letter===q.answer;
  choices.forEach((ch,i)=>{
    ch.classList.add('disabled');
    const l=LETTERS[i];
    if(l===q.answer) ch.classList.add('correct');
    else if(l===letter&&!correct) ch.classList.add('wrong');
  });
  card.classList.remove('wrong-tried');
  card.classList.add(correct?'correct':'wrong-tried');
  card.querySelector('.status-icon').textContent=correct?'✓':'✗';
  const exp=card.querySelector('.explanation');
  exp.classList.toggle('wrong-exp',!correct);
  exp.classList.add('show');
  await saveAnswer(q.id,q.theme,correct);
  buildStats();buildSidebar();
  if(window._mathJaxReady) MathJax.typesetPromise([exp]);
}

async function handleLAnswer(q,inp,btn,card){
  const raw=inp.value.trim().replace(/\s/g,'').replace(',','.');
  // Accept numeric answer with tolerance ±0.01, or exact string match
  let correct=false;
  const target=parseFloat(q.answerValue);
  if(!isNaN(target)){
    const userVal=parseFloat(raw.replace('−','-'));
    correct=!isNaN(userVal)&&Math.abs(userVal-target)<=0.01;
  } else {
    correct=raw.toLowerCase()===String(q.answerValue).toLowerCase();
  }
  inp.classList.add(correct?'correct-input':'wrong-input');
  inp.disabled=true;btn.disabled=true;
  card.classList.remove('wrong-tried');
  card.classList.add(correct?'correct':'wrong-tried');
  card.querySelector('.status-icon').textContent=correct?'✓':'✗';
  const exp=card.querySelector('.explanation');
  exp.classList.toggle('wrong-exp',!correct);
  exp.classList.add('show');
  if(!correct){
    // Show correct answer hint
    const hint=document.createElement('div');
    hint.style.cssText='margin-top:6px;font-size:0.8rem;color:var(--ink2);';
    hint.innerHTML=`Réponse attendue : <strong style="color:var(--green)">${q.answerDisplay}</strong>`;
    exp.before(hint);
    if(window._mathJaxReady) MathJax.typesetPromise([hint]);
  }
  await saveAnswer(q.id,q.theme,correct);
  buildStats();buildSidebar();
  if(window._mathJaxReady) MathJax.typesetPromise([exp]);
}

function buildMain(){buildStats();buildFilters();buildQuestions();}

// ── INIT ──
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='index.html';return;}
  userId=session.user.id;
  const {data:profile}=await sb.from('profiles').select('username').eq('id',userId).single();
  document.getElementById('userName').textContent=profile?.username||'';
  // Load answers
  const {data:ans}=await sb.from('answers').select('question_id,correct,attempts').eq('user_id',userId);
  if(ans) ans.forEach(a=>{userAnswers[a.question_id]={correct:a.correct,attempts:a.attempts};});
  // Streak
  const streak=await getStreak();
  document.getElementById('streakNum').textContent=streak;
  // Show UI
  document.getElementById('loading').style.display='none';
  document.getElementById('topbar').style.display='';
  document.getElementById('layout').style.display='flex';
  buildSidebar();buildMain();
  document.getElementById('btnLogout').addEventListener('click',async()=>{await sb.auth.signOut();location.href='index.html';});
}

init();
</script>
</body>
</html>
