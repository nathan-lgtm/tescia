<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeSciA — Entraînement</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap');
    :root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2336;--ink:#e8e6f0;--ink2:#9896b0;--ink3:#5a5870;--accent:#4f8ef7;--accent-l:#1a3060;--green:#2ecc8a;--green-l:#0d3322;--red:#f75f5f;--border:#2a2e45;--border-s:#363b58;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Source Serif 4',Georgia,serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .card{background:var(--surface);border:1px solid var(--border-s);border-radius:10px;width:100%;max-width:420px;padding:2.5rem;}
    .logo{text-align:center;margin-bottom:2rem;}
    .logo-badge{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--accent-l);background:#111827;padding:8px 20px;border-radius:6px;margin-bottom:1rem;}
    .logo-badge span{font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:600;color:var(--accent);}
    .logo h1{font-size:1.1rem;font-weight:300;color:var(--ink2);}
    .logo h1 em{font-style:italic;color:var(--ink);}
    .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.8rem;}
    .tab{flex:1;text-align:center;padding:8px 0;font-size:0.88rem;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
    .form-group{margin-bottom:1.1rem;}
    label{display:block;font-size:0.78rem;color:var(--ink2);margin-bottom:5px;letter-spacing:0.04em;}
    input{width:100%;padding:9px 12px;border:1px solid var(--border-s);border-radius:5px;background:var(--surface2);font-family:'Source Serif 4',serif;font-size:0.95rem;color:var(--ink);outline:none;transition:border-color 0.15s;}
    input:focus{border-color:var(--accent);}
    .btn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:5px;font-family:'Source Serif 4',serif;font-size:0.95rem;cursor:pointer;transition:opacity 0.15s;margin-top:0.4rem;}
    .btn:hover{opacity:0.9;}
    .btn:disabled{opacity:0.4;cursor:not-allowed;}
    .msg{margin-top:0.9rem;padding:9px 12px;border-radius:5px;font-size:0.83rem;display:none;}
    .msg.err{background:#2a1010;color:var(--red);border:1px solid #5a1010;}
    .msg.ok{background:var(--green-l);color:var(--green);border:1px solid #0d5a30;}
    .panel{display:none;} .panel.active{display:block;}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-badge"><span>TeSciA</span></div>
    <h1>Préparation au test · <em>AORES</em></h1>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="login">Connexion</div>
    <div class="tab" data-tab="signup">Inscription</div>
  </div>
  <div class="panel active" id="panel-login">
    <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="ton@email.com" autocomplete="email"></div>
    <div class="form-group"><label>Mot de passe</label><input type="password" id="login-pwd" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn" id="btn-login">Se connecter</button>
    <div class="msg" id="msg-login"></div>
  </div>
  <div class="panel" id="panel-signup">
    <div class="form-group"><label>Prénom / pseudo</label><input type="text" id="signup-name" placeholder="Ex : Marie" maxlength="30"></div>
    <div class="form-group"><label>Email</label><input type="email" id="signup-email" placeholder="ton@email.com" autocomplete="email"></div>
    <div class="form-group"><label>Mot de passe</label><input type="password" id="signup-pwd" placeholder="8 caractères minimum" autocomplete="new-password"></div>
    <button class="btn" id="btn-signup">Créer mon compte</button>
    <div class="msg" id="msg-signup"></div>
  </div>
</div>
<script>
// ════════════════════════════════
// ⚙️ REMPLACE CES DEUX VALEURS
// ════════════════════════════════
const SUPABASE_URL  = 'https://sb_publishable_VOGrDI9TEzIyjEdffttb5g_fOw1yx7X.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzcGp1aGV0dmxjZ2ticnh6aWZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTg4NTgsImV4cCI6MjA5MTY3NDg1OH0.7ckFf7yAQbNs2b4qcZz8xbEY7J4LwGKIkkl_78YUoF4';
// ════════════════════════════════
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
sb.auth.getSession().then(({data})=>{if(data.session) location.href='app.html';});
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab,.panel').forEach(e=>e.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('panel-'+t.dataset.tab).classList.add('active');
}));
function showMsg(id,txt,type){const e=document.getElementById(id);e.textContent=txt;e.className='msg '+type;e.style.display='block';}
document.getElementById('btn-login').addEventListener('click',async()=>{
  const btn=document.getElementById('btn-login');btn.disabled=true;btn.textContent='Connexion…';
  const {error}=await sb.auth.signInWithPassword({email:document.getElementById('login-email').value.trim(),password:document.getElementById('login-pwd').value});
  if(error){showMsg('msg-login','Email ou mot de passe incorrect.','err');btn.disabled=false;btn.textContent='Se connecter';}
  else location.href='app.html';
});
document.getElementById('btn-signup').addEventListener('click',async()=>{
  const btn=document.getElementById('btn-signup');
  const name=document.getElementById('signup-name').value.trim();
  const email=document.getElementById('signup-email').value.trim();
  const pwd=document.getElementById('signup-pwd').value;
  if(!name)return showMsg('msg-signup','Entre un prénom ou pseudo.','err');
  if(pwd.length<8)return showMsg('msg-signup','Mot de passe : 8 caractères minimum.','err');
  btn.disabled=true;btn.textContent='Création…';
  const {data,error}=await sb.auth.signUp({email,password:pwd});
  if(error){showMsg('msg-signup',error.message,'err');btn.disabled=false;btn.textContent='Créer mon compte';return;}
  if(data.user) await sb.from('profiles').update({username:name}).eq('id',data.user.id);
  showMsg('msg-signup','Compte créé ! Tu peux te connecter.','ok');
  btn.disabled=false;btn.textContent='Créer mon compte';
});
document.addEventListener('keydown',e=>{if(e.key==='Enter')document.querySelector('.panel.active .btn').click();});
</script>
</body>
</html>
